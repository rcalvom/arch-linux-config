# Minimal terminal-style lock screen. Hyprlock preserves the existing session.

$font = Terminus
$waybar_font = UbuntuMono Nerd Font
$accent = rgb(008ec4)
$text = rgb(e0e0e0)
$muted = rgb(4c566a)

general {
    hide_cursor = true
}

auth {
    fingerprint {
        enabled = true
        ready_message = Scan fingerprint to unlock
        present_message = Scanning fingerprint...
        retry_delay = 250
    }
}

animations {
    enabled = false
}

background {
    monitor =
    color = rgb(000000)
}

input-field {
    monitor =
    size = 460, 46
    outline_thickness = 2
    inner_color = rgb(000000)
    outer_color = $accent
    check_color = $accent
    fail_color = rgb(ff5555)
    font_color = $text
    fade_on_empty = false
    rounding = 0
    font_family = $font
    placeholder_text = password or fingerprint
    fail_text = $PAMFAIL
    dots_text_format = *
    dots_size = 0.35
    dots_spacing = 0.25
    position = 0, -55
    halign = center
    valign = center
}

label {
    monitor =
    text = LOCKED
    color = $accent
    font_size = 22
    font_family = $font
    position = 0, 0
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date +"%I:%M:%S %p"
    color = $text
    font_size = 48
    font_family = $waybar_font
    position = 0, 125
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    color = $muted
    font_size = 18
    font_family = $waybar_font
    position = 0, 180
    halign = center
    valign = center
}
