[terminal]
vt = 1

[default_session]
command = "tuigreet --time --time-format '%A, %B %d - %I:%M %p' --greeting 'Welcome to Arch Linux' --theme 'border=blue;text=white;prompt=white;time=white;action=white;button=blue;container=black;input=white;greet=white;title=blue' --width 72 --window-padding 2 --container-padding 2 --prompt-padding 1 --greet-align center --remember --remember-session --asterisks --user-menu --user-menu-min-uid 1000 --sessions /usr/share/wayland-sessions --xsessions /usr/share/xsessions --xsession-wrapper /usr/local/libexec/archcfg-xsession-wrapper --cmd Hyprland"
user = "greeter"
