# Yazi 26.5.x configuration.

[mgr]
ratio = [1, 4, 3]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "size"
show_hidden = false
show_symlink = true
scrolloff = 5

[preview]
wrap = "yes"
tab_size = 4
max_width = 1600
max_height = 1200
image_filter = "lanczos3"
image_quality = 80

[opener]
edit = [{ run = "nvim %s", block = true, desc = "Edit in Neovim", for = "unix" }]
open = [{ run = "xdg-open %s", orphan = true, desc = "Open with default application", for = "unix" }]
pdf = [{ run = "evince %s", orphan = true, desc = "Open PDF with Evince", for = "unix" }]
image = [{ run = "bash ~/.config/yazi/preview-image %s", block = true, desc = "View image in terminal", for = "unix" }]
media = [{ run = "mpv %s", orphan = true, desc = "Play with mpv", for = "unix" }]

[open]
prepend_rules = [
  { mime = "text/*", use = ["edit", "open"] },
  { mime = "application/json", use = ["edit", "open"] },
  { url = "*.{toml,yaml,yml,ini,conf,env,md,markdown,log}", use = ["edit", "open"] },
  { mime = "application/pdf", use = ["pdf", "open"] },
  { mime = "image/*", use = "image" },
  { mime = "{audio,video}/*", use = ["media", "open"] },
]

[plugin]
prepend_previewers = [
  # Images are intentionally shown only through the Enter opener above.
  { mime = "image/*", run = "noop" },
]

[input]
cursor_blink = true

[which]
sort_by = "desc"
