[app]
overall = { bg = "#000000" }

[mgr]
cwd = { fg = "#f1ffff", bold = true }
find_keyword = { fg = "#20a5ba", bold = true }
find_position = { fg = "#f1ffff", bg = "#033e8c", bold = true }
symlink_target = { fg = "#4c566a" }
marker_copied = { fg = "#20a5ba", bold = true }
marker_cut = { fg = "#ff5555", bold = true }
marker_marked = { fg = "#f1ffff", bg = "#012340" }
marker_selected = { fg = "#f1ffff", bg = "#033e8c" }
count_copied = { fg = "#000000", bg = "#20a5ba" }
count_cut = { fg = "#000000", bg = "#ff5555" }
count_selected = { fg = "#f1ffff", bg = "#033e8c" }
border_symbol = "│"
border_style = { fg = "#033e8c" }

[indicator]
parent = { fg = "#d6d6d6", bg = "#012340" }
current = { fg = "#f1ffff", bg = "#033e8c", bold = true }
preview = { fg = "#f1ffff", bg = "#000e29" }
padding = { open = " ", close = " " }

[tabs]
active = { fg = "#f1ffff", bg = "#033e8c", bold = true }
inactive = { fg = "#d6d6d6", bg = "#012340" }
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[mode]
normal_main = { fg = "#000000", bg = "#20a5ba", bold = true }
normal_alt = { fg = "#f1ffff", bg = "#012340" }
select_main = { fg = "#000000", bg = "#f3e430", bold = true }
select_alt = { fg = "#f1ffff", bg = "#012340" }
unset_main = { fg = "#f1ffff", bg = "#4c566a", bold = true }
unset_alt = { fg = "#f1ffff", bg = "#012340" }

[status]
overall = { fg = "#d6d6d6", bg = "#000e29" }
sep_left = { open = "", close = "" }
sep_right = { open = "", close = "" }
perm_type = { fg = "#20a5ba" }
perm_read = { fg = "#10a778" }
perm_write = { fg = "#f3e430" }
perm_exec = { fg = "#20bbfc" }
perm_sep = { fg = "#4c566a" }
progress_label = { fg = "#f1ffff", bold = true }
progress_normal = { fg = "#20a5ba", bg = "#012340" }
progress_error = { fg = "#ff5555", bg = "#012340" }

[which]
cols = 2
mask = { bg = "#000000" }
cand = { fg = "#20a5ba", bold = true }
rest = { fg = "#f1ffff" }
desc = { fg = "#d6d6d6" }
separator = " -> "
separator_style = { fg = "#4c566a" }

[confirm]
border = { fg = "#033e8c" }
title = { fg = "#f1ffff", bold = true }
body = { fg = "#d6d6d6" }
list = { fg = "#f1ffff" }
btn_yes = { fg = "#000000", bg = "#20a5ba", bold = true }
btn_no = { fg = "#f1ffff", bg = "#4c566a" }
btn_labels = [" Yes ", " No "]

[spot]
border = { fg = "#033e8c" }
title = { fg = "#f1ffff", bold = true }
tbl_col = { fg = "#f1ffff", bg = "#012340" }
tbl_cell = { fg = "#f1ffff", bg = "#033e8c" }

[notify]
title_info = { fg = "#20a5ba", bold = true }
title_warn = { fg = "#f3e430", bold = true }
title_error = { fg = "#ff5555", bold = true }

[pick]
border = { fg = "#033e8c" }
active = { fg = "#f1ffff", bg = "#033e8c", bold = true }
inactive = { fg = "#d6d6d6" }

[input]
border = { fg = "#033e8c" }
title = { fg = "#f1ffff", bold = true }
value = { fg = "#f1ffff" }
selected = { fg = "#f1ffff", bg = "#033e8c" }

[cmp]
border = { fg = "#033e8c" }
active = { fg = "#f1ffff", bg = "#033e8c", bold = true }
inactive = { fg = "#d6d6d6" }
icon_file = ""
icon_folder = ""
icon_command = ""

[tasks]
border = { fg = "#033e8c" }
title = { fg = "#f1ffff", bold = true }
hovered = { fg = "#f1ffff", bg = "#033e8c" }

[help]
on = { fg = "#20a5ba", bold = true }
run = { fg = "#f1ffff" }
desc = { fg = "#d6d6d6" }
hovered = { fg = "#f1ffff", bg = "#033e8c" }
footer = { fg = "#4c566a" }
icon_info = ""
icon_warn = ""
icon_error = ""

[filetype]
rules = [
  { mime = "image/*", fg = "#f3e430" },
  { mime = "{audio,video}/*", fg = "#20a5ba" },
  { mime = "application/pdf", fg = "#ff5555" },
  { mime = "inode/empty", fg = "#4c566a" },
  { url = "*", is = "orphan", fg = "#ff5555" },
  { url = "*/", fg = "#20bbfc", bold = true },
]
