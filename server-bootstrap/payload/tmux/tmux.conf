# Keep tmux usable over SSH without external plugins.
set -g mouse on
set -g history-limit 100000
set -g default-terminal "screen-256color"
set -g status-interval 5
set -g status-style "bg=default,fg=#d6d6d6"
set -g status-left "#[fg=#20bbfc,bold] #S #[default]"
set -g status-right "#[fg=#818181]%Y-%m-%d %H:%M #[default]"
set -g pane-border-style "fg=#005f87"
set -g pane-active-border-style "fg=#20bbfc"
set -g message-style "bg=#2c2c2c,fg=#f3e430"
set -g mode-keys vi
setw -g monitor-activity on
set -g visual-activity on
